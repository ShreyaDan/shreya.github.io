<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐷 Find Peppa Pig!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #d4f5ff, #ffe8f5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    padding: 10px;
    user-select: none;
  }

  #title {
    font-size: clamp(20px, 3.5vw, 32px);
    color: #FF3D5A;
    font-weight: 900;
    text-shadow: 3px 3px 0 #FFB6C1, 5px 5px 0 rgba(0,0,0,0.08);
    margin-bottom: 8px;
    text-align: center;
  }

  #hud {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
    width: 100%;
    max-width: 960px;
  }

  #score-box {
    background: white;
    border-radius: 20px;
    padding: 5px 14px;
    font-weight: 800;
    font-size: 16px;
    color: #FF3D5A;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    border: 3px solid #FFB6C1;
    white-space: nowrap;
  }

  #timer-bar-wrap {
    flex: 1;
    height: 20px;
    background: #f0f0f0;
    border-radius: 10px;
    overflow: hidden;
    border: 3px solid #22c55e;
    box-shadow: 0 0 10px #22c55e44;
    transition: border-color 0.3s;
  }

  #timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #22c55e, #22c55e88);
    border-radius: 10px;
    transition: width 1s linear, background 0.3s;
  }

  #timer-num {
    background: #22c55e;
    color: white;
    border-radius: 20px;
    padding: 5px 12px;
    font-weight: 900;
    font-size: 18px;
    min-width: 50px;
    text-align: center;
    box-shadow: 0 3px 12px #22c55e88;
    transition: background 0.3s;
    white-space: nowrap;
  }

  #round-box {
    background: white;
    border-radius: 20px;
    padding: 5px 12px;
    font-weight: 700;
    font-size: 13px;
    color: #888;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    border: 3px solid #ddd;
    white-space: nowrap;
  }

  #hint {
    font-size: 13px;
    color: #888;
    margin-bottom: 4px;
    font-style: italic;
    min-height: 20px;
    text-align: center;
  }

  #hint.wrong {
    color: #E53935;
    font-style: normal;
    font-weight: 700;
    animation: wrongShake 0.4s ease;
  }

  #scene-wrap {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 50px rgba(0,0,0,0.22);
    border: 5px solid white;
    max-width: 100%;
  }

  #scene-wrap.shake { animation: wrongShake 0.4s ease; }

  #game-svg {
    display: block;
    max-width: 100%;
    cursor: default;
  }

  #game-svg.playing { cursor: crosshair; }

  .peppa-group { cursor: pointer; }

  #footer {
    margin-top: 8px;
    font-size: 12px;
    color: #aaa;
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: white;
    border-radius: 24px;
    padding: 28px 38px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    animation: bounceIn 0.45s cubic-bezier(.36,.07,.19,.97) both;
    max-width: 320px;
  }

  .card .emoji { font-size: 54px; margin-bottom: 8px; }
  .card h2 { font-size: 24px; font-weight: 900; color: #FF3D5A; margin-bottom: 6px; }
  .card p { font-size: 14px; color: #888; margin-bottom: 20px; line-height: 1.5; }
  .card .sub { font-size: 16px; color: #888; margin-bottom: 4px; }
  .card .pts { font-size: 19px; font-weight: 800; color: #FFB300; margin-bottom: 18px; }

  .btn {
    background: linear-gradient(135deg, #FF3D5A, #FF8FAB);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 32px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 5px 18px #FF3D5A66;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    transition: transform 0.15s;
  }

  .btn:hover { transform: scale(1.06); }

  .btn-sm {
    background: linear-gradient(135deg, #FF3D5A, #FF8FAB);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 5px 18px #FF3D5A66;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  }

  .btn-grey {
    background: #eee;
    color: #555;
    border: none;
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  }

  .btn-row { display: flex; gap: 10px; justify-content: center; }

  @keyframes bounceIn {
    0%   { transform: scale(0.3) rotate(-8deg); opacity: 0; }
    65%  { transform: scale(1.1) rotate(2deg);  opacity: 1; }
    100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
  }

  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-9px); }
    75%     { transform: translateX(9px); }
  }

  @keyframes peppaGlow {
    from { stroke-width: 7px; }
    to   { stroke-width: 14px; }
  }

  .peppa-ring {
    animation: peppaGlow 0.5s ease-in-out infinite alternate;
  }
</style>
</head>
<body>

<div id="title">🐷 Find Peppa Pig! 🐷</div>

<div id="hud">
  <div id="score-box">⭐ <span id="score">0</span></div>
  <div id="timer-bar-wrap">
    <div id="timer-bar"></div>
  </div>
  <div id="timer-num"><span id="timer-display">10</span>s</div>
  <div id="round-box">Round <span id="round-display">1</span></div>
</div>

<div id="hint">Peppa is hiding in the scene. Find her red dress!</div>

<div id="scene-wrap">
  <svg id="game-svg" width="960" height="580" viewBox="0 0 960 580"></svg>
  <div id="overlay-container"></div>
</div>

<div id="footer">Snort snort! 🐷 Can you spot Peppa before time runs out?</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
const W = 960, H = 580;

const PEPPA_SPOTS = [
  {x:480,y:370},{x:140,y:420},{x:790,y:310},
  {x:310,y:460},{x:650,y:400},{x:220,y:350},
  {x:860,y:430},{x:540,y:280}
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let round = 0, score = 0, timeLeft = 10, phase = 'idle', found = false, timerInterval = null;

// ─── SVG HELPERS ─────────────────────────────────────────────────────────────
function el(tag, attrs={}, parent=null) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

function g(attrs={}, parent=null) { return el('g', attrs, parent); }

const ST = (w=3) => ({ stroke:'#1a1a1a', 'stroke-width':w, 'stroke-linejoin':'round', 'stroke-linecap':'round' });

function applyAttrs(e, attrs) {
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// ─── DRAWING FUNCTIONS ────────────────────────────────────────────────────────

function drawSky(parent) {
  const defs = el('defs', {}, parent);
  const sg = el('linearGradient', {id:'skyGrad',x1:'0',y1:'0',x2:'0',y2:'1'}, defs);
  applyAttrs(el('stop',{},sg), {offset:'0%','stop-color':'#87CEEB'});
  applyAttrs(el('stop',{},sg), {offset:'100%','stop-color':'#C9ECF7'});
  const gg = el('linearGradient', {id:'groundGrad',x1:'0',y1:'0',x2:'0',y2:'1'}, defs);
  applyAttrs(el('stop',{},gg), {offset:'0%','stop-color':'#8CC84B'});
  applyAttrs(el('stop',{},gg), {offset:'100%','stop-color':'#6AAF2E'});
  applyAttrs(el('rect',{},parent), {width:W,height:H,fill:'url(#skyGrad)'});
}

function drawGround(parent) {
  applyAttrs(el('ellipse',{},parent), {cx:480,cy:340,rx:560,ry:140,fill:'#7AC74F',...ST(4)});
  applyAttrs(el('rect',{},parent), {x:0,y:370,width:W,height:H-370,fill:'url(#groundGrad)',stroke:'#1a1a1a','stroke-width':3});
  [60,180,290,410,530,670,790,900].forEach(gx => {
    const tg = el('g', {transform:`translate(${gx},370)`}, parent);
    applyAttrs(el('path',{},tg), {d:'M0,0 Q-6,-14 -3,-20 Q0,-10 3,-20 Q6,-12 0,0',fill:'#6CC244',...ST(2)});
  });
}

function drawSun(parent) {
  const gr = g({}, parent);
  for (let d=0; d<360; d+=45) {
    const rad = d*Math.PI/180;
    applyAttrs(el('line',{},gr),{x1:880+Math.cos(rad)*44,y1:55+Math.sin(rad)*44,x2:880+Math.cos(rad)*58,y2:55+Math.sin(rad)*58,stroke:'#1a1a1a','stroke-width':3,'stroke-linecap':'round'});
  }
  applyAttrs(el('circle',{},gr),{cx:880,cy:55,r:38,fill:'#FFD93B',stroke:'#1a1a1a','stroke-width':4});
  applyAttrs(el('circle',{},gr),{cx:868,cy:46,r:5,fill:'#1a1a1a'});
  applyAttrs(el('circle',{},gr),{cx:892,cy:46,r:5,fill:'#1a1a1a'});
  applyAttrs(el('path',{},gr),{d:'M868,62 Q880,72 892,62',fill:'none',stroke:'#1a1a1a','stroke-width':3,'stroke-linecap':'round'});
}

function drawCloud(parent, x, y, scale=1) {
  const gr = g({transform:`translate(${x},${y}) scale(${scale})`}, parent);
  [{cx:0,cy:0,rx:55,ry:30},{cx:35,cy:-12,rx:38,ry:25},{cx:-32,cy:-8,rx:32,ry:20},{cx:8,cy:-22,rx:28,ry:20}]
    .forEach(a => applyAttrs(el('ellipse',{},gr),{...a,fill:'white',...ST(4)}));
}

function drawRainbow(parent) {
  const gr = g({opacity:0.85}, parent);
  ['#FF4444','#FF9900','#FFE500','#44BB44','#4499FF','#AA44FF'].forEach((c,i) => {
    applyAttrs(el('path',{},gr),{
      d:`M ${110+i*7},${300-i*2} A ${290-i*7} ${180-i*4} 0 0 1 ${550-i*7},${300-i*2}`,
      fill:'none',stroke:c,'stroke-width':9,'stroke-linecap':'round'
    });
  });
}

function drawHouse(parent, x, y, wallColor='#FF8FAB', roofColor='#D63052', w=110, h=90) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('rect',{},gr),{x:0,y:0,width:w,height:h,fill:wallColor,rx:6,...ST(4)});
  applyAttrs(el('polygon',{},gr),{points:`${-10},0 ${w/2},${-h*0.6} ${w+10},0`,fill:roofColor,...ST(4)});
  applyAttrs(el('rect',{},gr),{x:w*0.65,y:-h*0.55,width:16,height:28,fill:roofColor,...ST(4)});
  applyAttrs(el('rect',{},gr),{x:w*0.62,y:-h*0.6,width:22,height:8,fill:roofColor,...ST(4)});
  applyAttrs(el('rect',{},gr),{x:w*0.38,y:h*0.42,width:w*0.24,height:h*0.58,fill:'#A0522D',rx:4,...ST(3)});
  applyAttrs(el('circle',{},gr),{cx:w*0.54,cy:h*0.71,r:4,fill:'#FFD93B',stroke:'#1a1a1a','stroke-width':2});
  [[w*0.08,w*0.7]].forEach(()=>{});
  [w*0.08,w*0.7].forEach(wx => {
    applyAttrs(el('rect',{},gr),{x:wx,y:h*0.18,width:w*0.22,height:h*0.22,fill:'#AEE4F5',rx:4,...ST(3)});
    applyAttrs(el('line',{},gr),{x1:wx+w*0.11,y1:h*0.18,x2:wx+w*0.11,y2:h*0.4,stroke:'#1a1a1a','stroke-width':2});
    applyAttrs(el('line',{},gr),{x1:wx,y1:h*0.29,x2:wx+w*0.22,y2:h*0.29,stroke:'#1a1a1a','stroke-width':2});
  });
}

function drawTree(parent, x, y, scale=1) {
  const gr = g({transform:`translate(${x},${y}) scale(${scale})`}, parent);
  applyAttrs(el('rect',{},gr),{x:-8,y:0,width:16,height:52,fill:'#8B5E3C',...ST(4)});
  applyAttrs(el('ellipse',{},gr),{cx:0,cy:-18,rx:42,ry:38,fill:'#5DBE3A',...ST(4)});
  applyAttrs(el('ellipse',{},gr),{cx:-16,cy:-8,rx:26,ry:22,fill:'#6DD44A',...ST(3)});
}

function drawBush(parent, x, y, color='#5DBE3A') {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  [{cx:0,cy:0,rx:32,ry:22},{cx:-18,cy:4,rx:22,ry:16},{cx:18,cy:4,rx:22,ry:16}]
    .forEach(a => applyAttrs(el('ellipse',{},gr),{...a,fill:color,...ST(3)}));
}

function drawFlower(parent, x, y, color='#FF69B4', stemH=28) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('line',{},gr),{x1:0,y1:0,x2:0,y2:-stemH,stroke:'#4CAF50','stroke-width':3,'stroke-linecap':'round'});
  for (let d=0; d<360; d+=60) {
    const rad=d*Math.PI/180, cx=Math.cos(rad)*9, cy=-stemH+Math.sin(rad)*9;
    const pe = el('ellipse',{},gr);
    applyAttrs(pe,{cx,cy,rx:7,ry:5,fill:color,...ST(2),transform:`rotate(${d},${cx},${cy})`});
  }
  applyAttrs(el('circle',{},gr),{cx:0,cy:-stemH,r:6,fill:'#FFD93B',stroke:'#1a1a1a','stroke-width':2});
}

function drawFence(parent, x, y, count=6, gap=22) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  for (let i=0;i<count;i++) {
    const pg = g({transform:`translate(${i*gap},0)`}, gr);
    applyAttrs(el('rect',{},pg),{x:0,y:-28,width:11,height:44,fill:'white',rx:3,...ST(3)});
    applyAttrs(el('polygon',{},pg),{points:'5.5,-36 0,-28 11,-28',fill:'white',...ST(3)});
  }
  applyAttrs(el('rect',{},gr),{x:0,y:-16,width:count*gap,height:6,fill:'white',rx:3,...ST(3)});
  applyAttrs(el('rect',{},gr),{x:0,y:2,width:count*gap,height:6,fill:'white',rx:3,...ST(3)});
}

function drawLampPost(parent, x, y) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('rect',{},gr),{x:-5,y:-120,width:10,height:120,fill:'#8B7355',rx:3,...ST(3)});
  applyAttrs(el('path',{},gr),{d:'M-5,-120 Q-5,-138 -30,-138',fill:'none',stroke:'#8B7355','stroke-width':8,'stroke-linecap':'round'});
  applyAttrs(el('ellipse',{},gr),{cx:-30,cy:-138,rx:14,ry:9,fill:'#FFE680',stroke:'#1a1a1a','stroke-width':3});
  applyAttrs(el('ellipse',{},gr),{cx:-30,cy:-138,rx:8,ry:5,fill:'#FFFDE0',opacity:0.7});
}

function drawBench(parent, x, y) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('rect',{},gr),{x:-45,y:-28,width:90,height:10,fill:'#CD853F',rx:4,...ST(3)});
  applyAttrs(el('rect',{},gr),{x:-45,y:-44,width:90,height:8,fill:'#CD853F',rx:4,...ST(3)});
  [-32,18].forEach(lx => {
    applyAttrs(el('rect',{},gr),{x:lx,y:-28,width:9,height:28,fill:'#A0522D',rx:3,...ST(3)});
    applyAttrs(el('rect',{},gr),{x:lx-4,y:-4,width:17,height:6,fill:'#A0522D',rx:2,...ST(3)});
  });
}

function drawMailbox(parent, x, y) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('rect',{},gr),{x:-6,y:-60,width:12,height:60,fill:'#888',rx:3,...ST(3)});
  applyAttrs(el('rect',{},gr),{x:-18,y:-90,width:36,height:30,fill:'#E53935',rx:4,...ST(3)});
  applyAttrs(el('path',{},gr),{d:'M-18,-90 Q0,-76 18,-90',fill:'#C62828',...ST(3)});
  applyAttrs(el('rect',{},gr),{x:-8,y:-76,width:16,height:4,fill:'#222',rx:2});
}

function drawTrashCan(parent, x, y, color='#78909C') {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('rect',{},gr),{x:-14,y:-46,width:28,height:46,fill:color,rx:4,...ST(3)});
  applyAttrs(el('rect',{},gr),{x:-16,y:-50,width:32,height:10,fill:'#546E7A',rx:4,...ST(3)});
  applyAttrs(el('line',{},gr),{x1:0,y1:-50,x2:0,y2:-60,stroke:'#1a1a1a','stroke-width':3,'stroke-linecap':'round'});
  [-6,0,6].forEach(lx => applyAttrs(el('line',{},gr),{x1:lx,y1:-26,x2:lx,y2:-10,stroke:'#546E7A','stroke-width':2}));
}

function drawSignPost(parent, x, y, label='PARK') {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('rect',{},gr),{x:-4,y:-90,width:8,height:90,fill:'#8B5E3C',rx:3,...ST(3)});
  applyAttrs(el('rect',{},gr),{x:-32,y:-90,width:64,height:28,fill:'#FFD93B',rx:6,...ST(3)});
  const txt = el('text',{},gr);
  applyAttrs(txt,{x:0,y:-70,'text-anchor':'middle','font-size':11,'font-weight':'bold','font-family':"'Comic Sans MS',cursive",fill:'#1a1a1a'});
  txt.textContent = label;
}

function drawMudPuddle(parent, x, y, rx=55, ry=20) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('ellipse',{},gr),{cx:0,cy:0,rx,ry,fill:'#A0785A',stroke:'#1a1a1a','stroke-width':3});
  applyAttrs(el('ellipse',{},gr),{cx:-8,cy:-4,rx:rx*0.55,ry:ry*0.45,fill:'#B8906A',opacity:0.6});
}

function drawPond(parent, x, y) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('ellipse',{},gr),{cx:0,cy:0,rx:90,ry:38,fill:'#5BC8E8',stroke:'#1a1a1a','stroke-width':4});
  applyAttrs(el('ellipse',{},gr),{cx:0,cy:0,rx:74,ry:28,fill:'#7BE0F8',opacity:0.45});
  applyAttrs(el('ellipse',{},gr),{cx:-28,cy:6,rx:16,ry:9,fill:'#4CAF50',stroke:'#1a1a1a','stroke-width':2});
  applyAttrs(el('ellipse',{},gr),{cx:30,cy:-6,rx:12,ry:7,fill:'#4CAF50',stroke:'#1a1a1a','stroke-width':2});
  applyAttrs(el('ellipse',{},gr),{cx:10,cy:-8,rx:18,ry:11,fill:'white',stroke:'#1a1a1a','stroke-width':2.5});
  applyAttrs(el('circle',{},gr),{cx:24,cy:-16,r:9,fill:'white',stroke:'#1a1a1a','stroke-width':2.5});
  applyAttrs(el('ellipse',{},gr),{cx:31,cy:-15,rx:7,ry:4,fill:'#FF9800',stroke:'#1a1a1a','stroke-width':2});
  applyAttrs(el('circle',{},gr),{cx:27,cy:-18,r:2,fill:'#1a1a1a'});
}

function drawSlide(parent, x, y) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('rect',{},gr),{x:-22,y:-110,width:44,height:12,fill:'#FFD93B',rx:4,...ST(3)});
  applyAttrs(el('rect',{},gr),{x:-20,y:-110,width:9,height:110,fill:'#FF9800',rx:4,...ST(4)});
  applyAttrs(el('rect',{},gr),{x:11,y:-110,width:9,height:110,fill:'#FF9800',rx:4,...ST(4)});
  [-85,-65,-45,-22].forEach(ly => applyAttrs(el('rect',{},gr),{x:-20,y:ly,width:40,height:7,fill:'#FFCC02',rx:3,...ST(3)}));
  applyAttrs(el('path',{},gr),{d:'M18,-98 L90,0',stroke:'#FF5722','stroke-width':28,'stroke-linecap':'round'});
  applyAttrs(el('path',{},gr),{d:'M18,-98 L90,0',stroke:'#FF7043','stroke-width':22,'stroke-linecap':'round'});
  applyAttrs(el('path',{},gr),{d:'M22,-104 L94,-6',stroke:'#1a1a1a','stroke-width':3,'stroke-linecap':'round',fill:'none'});
  applyAttrs(el('path',{},gr),{d:'M14,-92 L86,6',stroke:'#1a1a1a','stroke-width':3,'stroke-linecap':'round',fill:'none'});
}

function drawSeesaw(parent, x, y) {
  const gr = g({transform:`translate(${x},${y})`}, parent);
  applyAttrs(el('polygon',{},gr),{points:'0,0 -16,28 16,28',fill:'#9E9E9E',...ST(3)});
  applyAttrs(el('rect',{},gr),{x:-18,y:26,width:36,height:8,fill:'#757575',rx:3,...ST(3)});
  applyAttrs(el('rect',{},gr),{x:-65,y:-10,width:130,height:12,fill:'#CD853F',rx:5,transform:'rotate(-10)',...ST(3)});
  applyAttrs(el('rect',{},gr),{x:-78,y:-2,width:22,height:10,fill:'#FF5252',rx:4,transform:'rotate(-10)',...ST(3)});
  applyAttrs(el('rect',{},gr),{x:57,y:-18,width:22,height:10,fill:'#FF5252',rx:4,transform:'rotate(-10)',...ST(3)});

function drawSwingSet(parent, x, y) {

  [{cx:-6},{cx:10}].forEach(({cx}) => applyAttrs(el('circle',{},gr),{cx,cy:-58,r:1.5,fill:'white'}));
  [{cx:-22},{cx:22}].forEach(({cx}) => applyAttrs(el('circle',{},gr),{cx,cy:-70,r:12,fill:'#F9A8B8',...ST(4)}));
  applyAttrs(el('path',{},gr),{d:'M-8,-34 Q0,-26 8,-34',fill:'none',stroke:'#D05070','stroke-width':2.5,'stroke-linecap':'round'});

  return gr;
}

// ─── SCENE BUILDER ────────────────────────────────────────────────────────────

  drawPond(svg,490,510);
  [[250,500,52,18],[720,505,48,17],[100,520,40,14],[870,510,38,14]].forEach(([x,y,rx,ry]) => drawMudPuddle(svg,x,y,rx,ry));
  drawSlide(svg,380,430);

  drawMummyPig(svg,60,455);

  const peppaEl = drawPeppa(svg, peppaPos.x, peppaPos.y, isFound);
  return peppaEl;
}

// ─── OVERLAY HELPERS ─────────────────────────────────────────────────────────

function showOverlay(html) {
  const oc = document.getElementById('overlay-container');
  oc.innerHTML = `<div class="overlay"><div class="card">${html}</div></div>`;
}

function hideOverlay() {
  document.getElementById('overlay-container').innerHTML = '';
}

// ─── TIMER COLOUR ─────────────────────────────────────────────────────────────

function timerColor(t) {
  return t > 5 ? '#22c55e' : t > 2 ? '#f59e0b' : '#ef4444';
}

function updateTimerUI() {
  const c = timerColor(timeLeft);
  document.getElementById('timer-display').textContent = timeLeft;
  document.getElementById('timer-bar').style.width = (timeLeft * 10) + '%';
  document.getElementById('timer-bar').style.background = `linear-gradient(90deg,${c},${c}88)`;
  document.getElementById('timer-bar-wrap').style.borderColor = c;
  document.getElementById('timer-bar-wrap').style.boxShadow = `0 0 10px ${c}44`;
  document.getElementById('timer-num').style.background = c;
  document.getElementById('timer-num').style.boxShadow = `0 3px 12px ${c}88`;
}

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('round-display').textContent = round + 1;
  updateTimerUI();
}

function startRound() {
  found = false;
  timeLeft = 10;
  phase = 'playing';
  hideOverlay();
  updateHUD();

  const svg = document.getElementById('game-svg');
  svg.className = 'playing';
  const peppaPos = PEPPA_SPOTS[round % PEPPA_SPOTS.length];
  const peppaEl = buildScene(svg, peppaPos, false);

  document.getElementById('hint').textContent = 'Find Peppa in her red dress — click her before time runs out!';
  document.getElementById('hint').className = '';

  peppaEl.addEventListener('click', (e) => {
    e.stopPropagation();
    if (phase !== 'playing' || found) return;
    found = true;
    clearInterval(timerInterval);
    score += Math.max(1, timeLeft);
    updateHUD();
    buildScene(svg, peppaPos, true);
    svg.className = '';
    document.getElementById('hint').textContent = '🎉 Found her!';
    setTimeout(() => showWon(), 900);
  });

  svg.onclick = (e) => {
    if (phase !== 'playing' || found) return;
    const hint = document.getElementById('hint');
    const wrap = document.getElementById('scene-wrap');
    hint.textContent = "❌ That's not Peppa! Keep looking…";
    hint.className = 'wrong';
    wrap.classList.add('shake');
    setTimeout(() => {
      hint.textContent = 'Find Peppa in her red dress — click her before time runs out!';
      hint.className = '';
      wrap.classList.remove('shake');
    }, 400);
  };

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      phase = 'lost';
      svg.className = '';
      showLost();
    }
  }, 1000);
}

function showIdle() {
  phase = 'idle';
  showOverlay(`
    <div class="emoji">🐷</div>
    <h2>Find Peppa Pig!</h2>
    <p>Peppa is hiding in the scene.<br/>Spot her in her <b>red dress</b> in 10 seconds!</p>
    <button class="btn" onclick="round=0;score=0;updateHUD();startRound()">🎮 Play!</button>
  `);
  document.getElementById('hint').textContent = 'Peppa is hiding in the scene. Find her red dress!';
}

function showWon() {
  phase = 'won';
  showOverlay(`
    <div class="emoji">🎉</div>
    <h2>You found Peppa!</h2>
    <div class="sub">+${Math.max(1,timeLeft)} points!</div>
    <div class="pts">⭐ Score: ${score}</div>
    <button class="btn" onclick="round++;startRound()">➡️ Next Round</button>
  `);
}

function showLost() {
  showOverlay(`
    <div class="emoji">⏰</div>
    <h2>Time's up!</h2>
    <p>Peppa was hiding there all along!</p>
    <div class="pts">⭐ Score: ${score}</div>
    <div class="btn-row">
      <button class="btn-grey" onclick="round=0;score=0;updateHUD();showIdle()">🔄 Restart</button>
      <button class="btn-sm" onclick="round++;startRound()">➡️ Try Again</button>
    </div>
  `);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

const svg = document.getElementById('game-svg');
const peppaPos = PEPPA_SPOTS[0];
buildScene(svg, peppaPos, false);
updateHUD();
showIdle();
</script>
